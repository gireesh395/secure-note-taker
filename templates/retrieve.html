<!DOCTYPE html>
<html lang="en">
<head>
    <title>SANGAM CYBER | AGENT EXTRACTION</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .console { border: 2px solid #00ff41; padding: 30px; width: 400px; background: rgba(0, 20, 0, 0.9); }
        h2 { text-align: center; letter-spacing: 3px; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        input { width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; margin: 10px 0; box-sizing: border-box; font-size: 1.1em; text-align: center; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error { color: #ff3e3e; text-align: center; font-size: 0.9em; margin-top: 15px; border: 1px solid #ff3e3e; padding: 5px; }
        .nav { text-align: center; margin-top: 20px; font-size: 0.8em; }
        a { color: #00ff41; text-decoration: none; }
    </style>
</head>
<body>
    <div class="console">
        <h2>AGENT LOGIN</h2>
        <form method="POST">
            <input type="text" name="m_id" placeholder="ENTER MISSION ID" required autocomplete="off">
            <input type="password" name="passphrase" placeholder="ENTER SECRET CIPHER" required>
            <button type="submit">DECRYPT & EXTRACT</button>
        </form>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <div class="nav">
            <a href="/">< RETURN TO HANDLER MODE</a>
        </div>
    </div>
</body>
</html>
