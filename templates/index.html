<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECUREVAULT | MISSION HANDLER</title>
    <style>
        body { background-color: #0a0e14; color: #58a6ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .vault-container { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 8px; width: 500px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #f0f6fc; font-size: 1.5rem; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        textarea, input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 10px; margin-top: 10px; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; margin-top: 20px; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #8b949e; }
    </style>
</head>
<body>
    <div class="vault-container">
        <h1>SECURE<span>VAULT</span></h1>
        <p>AUDIT LOGS: NODE_01 <span style="color:#238636;">● SYSTEM ONLINE</span></p>
        
        <form action="/drop" method="POST">
            <textarea name="content" rows="5" placeholder="Document your findings..." required></textarea>
            <input type="text" name="cipher_key" placeholder="Enter Encryption Secret Key" required>
            <button type="submit">COMMIT TO DATABASE</button>
        </form>
    </div>
    
    <div class="footer">
        <a href="/retrieve" style="color: #58a6ff;">Go to Mission Retrieval Vault</a>
    </div>
</body>
</html>
