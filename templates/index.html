<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; } /* Deep Dark Blue */
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen p-6 md:p-12">

    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">SECURE<span class="text-blue-500">VAULT</span></h1>
                <p class="text-slate-400 text-sm font-mono uppercase tracking-widest">Audit Logs: Node_01</p>
            </div>
            <div class="flex items-center space-x-3 bg-slate-800 border border-slate-700 px-4 py-2 rounded-full">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-xs font-bold text-slate-300">SYSTEM ONLINE</span>
            </div>
        </div>

        <div class="glass-card p-6 rounded-3xl border border-slate-700 shadow-2xl mb-12">
            <form action="/add" method="POST">
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Create Secure Observation</label>
                <textarea name="content" required rows="3" 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 mb-4 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-slate-600"
                    placeholder="Document your findings..."></textarea>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all transform active:scale-95 shadow-lg shadow-blue-500/20">
                    COMMIT TO DATABASE
                </button>
            </form>
        </div>

        <div class="space-y-6">
            <h2 class="text-sm font-bold text-slate-500 uppercase px-2 mb-4">Latest Database Entries</h2>
            
            {% for note in notes %}
            <div class="glass-card p-6 rounded-2xl border-l-4 border-blue-500 border-t border-r border-b border-slate-700/50 hover:border-slate-600 transition-all shadow-md">
                <p class="text-slate-200 leading-relaxed text-lg mb-3">{{ note['content'] }}</p>
                <div class="flex items-center text-slate-500 text-[10px] font-mono uppercase tracking-tighter">
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>ID: {{ note['id'] }}</span>
                    <span class="mx-2">|</span>
                    <span>TIMESTAMP: {{ note['created_at'] }}</span>
                </div>
            </div>
            {% else %}
            <div class="text-center py-16 border-2 border-dashed border-slate-800 rounded-3xl">
                <p class="text-slate-600 italic">No logs found. Database is currently empty.</p>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
